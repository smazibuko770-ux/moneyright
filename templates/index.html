<!DOCTYPE html>
<html>
<head>
    <title>MoneyRight</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1b2a">

    <style>
        body { margin:0; font-family:Arial; background:#f1f3f6; }

        .header {
            background:#0d1b2a;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .profit {
            font-size:26px;
            color:#00c853;
            font-weight:bold;
        }

        .logout {
            background:#d50000;
            color:white;
            padding:8px 12px;
            border-radius:6px;
            text-decoration:none;
            font-size:12px;
        }

        .container { padding:15px; }

        .card {
            background:white;
            padding:15px;
            border-radius:12px;
            margin-bottom:12px;
        }

        .green { color:#00c853; }
        .red { color:#d50000; }

        .btn {
            display:block;
            text-align:center;
            padding:12px;
            border-radius:8px;
            margin-top:10px;
            text-decoration:none;
            color:white;
            font-weight:bold;
        }

        .income { background:#00c853; }
        .expense { background:#d50000; }
        .download { background:#007bff; }
        .reset { background:#333; }

        ul { padding-left:15px; }
    </style>
</head>

<body>

<div class="header">
    <div>
        <h3>MoneyRight</h3>
        <div class="profit">R{{ profit }}</div>
    </div>

    <a class="logout" href="/logout">Logout</a>
</div>

<div class="container">

    <div class="card">
        <h3>Total Earnings</h3>
        <p class="green">R{{ total_earnings }}</p>
    </div>

    <div class="card">
        <h3>Total Expenses</h3>
        <p class="red">R{{ total_expenses }}</p>
    </div>

    <div class="card">
        <a class="btn income" href="/add_earning">+ Add Earnings</a>
        <a class="btn expense" href="/add_expense">+ Add Expense</a>
        <a class="btn download" href="/download">Download Report</a>
    </div>

    <form method="POST" action="/reset">
        <button class="btn reset">Reset Week</button>
    </form>

</div>

</body>
</html>
