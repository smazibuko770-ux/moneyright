<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f1f3f6;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: #d50000;
            color: white;
            font-weight: bold;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Add Expense</h2>

    <form method="POST">
        <input type="number" name="amount" placeholder="Enter amount" required>
        <button type="submit">Save</button>
    </form>

    <a href="/">Back</a>
</div>

</body>
</html>
